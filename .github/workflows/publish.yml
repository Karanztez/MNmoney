name: Publish API to Repsy

on:
  push:
    branches: [ "main", "master" ] # ระบบจะทำงานเมื่อมีการ Push โค้ดเข้า branch หลัก

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23' # ตั้งเป็น Java 21 เพื่อให้ตรงกับโปรเจกต์ Paper 1.21 ของคุณ
        distribution: 'temurin'
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build and Publish to Repsy
      env:
        # ดึงรหัสผ่านจากความลับที่เราตั้งไว้ในขั้นตอนที่ 1 มาใช้งาน
        REPSY_USER: ${{ secrets.REPSY_USER }}
        REPSY_PASS: ${{ secrets.REPSY_PASS }}
      run: ./gradlew publish