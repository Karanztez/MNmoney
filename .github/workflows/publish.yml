name: Publish to Cloudsmith

on:
  push:
    branches:
      - master  # หรือชื่อกิ่งที่คุณใช้

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'
          distribution: 'temurin'
          server-id: cloudsmith # สำคัญ: ต้องตรงกับใน build.gradle (ถ้ามี)

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
      # เพิ่ม --no-daemon เพื่อให้บิวด์สะอาดและลดโอกาสค้างบน GitHub Actions
        run: ./gradlew build --no-daemon

      - name: Push to Cloudsmith
        uses: cloudsmith-io/action@master # เปลี่ยนจาก v0.1.0 เป็น master แทนครับ
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: 'push'
          format: 'maven'
          owner: 'younarak'  # เช็คชื่อ owner ใน Cloudsmith ให้เป๊ะนะครับ
          repo: 'mnmoney' # เช็คชื่อ repo ใน Cloudsmith ให้เป๊ะนะครับ
          file: 'build/libs/mnmoney-1.0.1.5.jar'