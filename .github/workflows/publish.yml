name: Publish to Cloudsmith

on:
  push:
    branches:
      - master  # หรือชื่อกิ่งที่คุณใช้

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'
          distribution: 'temurin'
          server-id: cloudsmith # สำคัญ: ต้องตรงกับใน build.gradle (ถ้ามี)

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Push to Cloudsmith
        uses: cloudsmith-io/action@v0.1.0
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: 'push'
          format: 'maven'
          # รูปแบบ: owner/repository (เปลี่ยนตามของตัวเองนะครับ)
          owner: 'younarak'
          repo: 'mnmoney'
          # ชี้ไปที่ไฟล์ jar ที่บิวด์เสร็จแล้ว
          file: 'build/libs/mnmoney-api-1.0.1.5.jar'
