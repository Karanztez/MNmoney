name: Publish to Cloudsmith

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # อัปเดตเป็น v4 เพื่อความใหม่

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23' # แนะนำให้ใช้ 21 เพราะเสถียรกับ Gradle 8.x/9.x มากกว่าครับ
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and Publish to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        # ใช้คำสั่งนี้บรรทัดเดียว มันจะส่งทั้ง .jar และ .pom ไปให้ครบถ้วนครับ
        run: ./gradlew publish --no-daemon